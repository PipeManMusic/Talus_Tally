name: Desktop Builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            artifact: talus-tally-linux
            tauri_bundles: deb
          - os: macos-latest
            target: macos
            artifact: talus-tally-macos
            tauri_bundles: dmg
          - os: windows-latest
            target: windows
            artifact: talus-tally-windows
            tauri_bundles: nsis

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (macOS)
        if: matrix.target == 'macos'
        run: |
          brew update
          brew install create-dmg

      - name: Setup Node.js
        if: matrix.target != 'linux'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        if: matrix.target != 'linux'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Setup Rust toolchain
        if: matrix.target != 'linux'
        uses: dtolnay/rust-toolchain@stable

      - name: Build Linux installer
        if: matrix.target == 'linux'
        run: bash build-deb.sh

      - name: Build macOS installer
        if: matrix.target == 'macos'
        run: bash build-macos.sh

      - name: Build Windows installer
        if: matrix.target == 'windows'
        shell: pwsh
        run: ./build-windows.ps1

      - name: Upload Linux artifact
        if: matrix.target == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: talus-tally_*_amd64.deb
          if-no-files-found: error

      - name: Upload macOS artifact
        if: matrix.target == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/macos/*.dmg
          if-no-files-found: error

      - name: Upload Windows artifact
        if: matrix.target == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/windows/*.exe
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded files
        run: find artifacts -type f | head -20

      - name: Resolve release notes file
        id: notes
        run: |
          # Derive version from tag: v0.1.9-alpha → 0.1.9-alpha
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES_FILE="docs/RELEASE_NOTES_${VERSION}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "file=$NOTES_FILE" >> "$GITHUB_OUTPUT"
          else
            echo "file=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          body_path: ${{ steps.notes.outputs.file || '' }}
          generate_release_notes: ${{ steps.notes.outputs.file == '' }}
          files: |
            artifacts/**/*.deb
            artifacts/**/*.dmg
            artifacts/**/*.exe
