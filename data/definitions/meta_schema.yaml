meta:
  version: "1.0"
  description: "Defines the allowed structure for project templates and node blueprints."

property_types:
  - id: "text"
    python_type: "str"
    description: "Plain text input"
    
  - id: "number"
    python_type: "float"
    description: "Numeric input"
    
  - id: "currency"
    python_type: "Decimal"
    description: "Currency amount"
    
  - id: "checkbox"
    python_type: "bool"
    description: "True/false checkbox toggle"
    
  - id: "date"
    python_type: "str"
    description: "Date value"
    
  - id: "select"
    python_type: "str"
    requires_options: true
    description: "Single selection from predefined options"
    options_format: 
      description: "Options can be either simple strings or objects with name, bullet, and optional id"
      note: "IDs are optional in templates; generated on load for stable reference"
      string_format: ["Option1", "Option2", "Option3"]
      object_format:
        - name: "string (required)"
          description: "The option value/label (human-readable)"
        - bullet: "string (optional)"
          description: "Bullet/indicator character to display for this option"
        - id: "string (optional)"
          description: "UUID for stable reference; auto-generated if not provided"

  - id: "node_reference"
    python_type: "str"
    description: "Reference to another node by ID"
    optional_fields:
      - target_type: "string (optional) - restricts reference targets to a node type (e.g. person)"

  - id: "editor"
    python_type: "str"
    description: "Rich text editor with optional markup formatting profile"
    optional_fields:
      - markup_profile: "string (optional) - ID of a markup profile that defines token-based formatting rules"

node_types:
  description: "Defines node types used in project templates"
  required_fields:
    - id: "required - unique identifier for the node type"
    - label: "required - display name for the node type"
    - allowed_children: "optional - array of allowed child node type ids"
    - has_time_log: "optional - boolean for time tracking capability"
    - properties: "optional - array of property definitions"

property_definition:
  required_fields:
    - id: "required - unique property identifier"
    - label: "required - display name for property"
    - type: "required - property type id from property_types"
  optional_fields:
    - required: "optional - boolean, defaults to false"
    - value: "optional - default value for the property"
    - target_type: "optional - for node_reference properties, the required target node type"
    - options: "required if type is 'select', array of string or object options"
    - system_locked: "optional - boolean, when true the user cannot rename or delete this property"
    - ui_group: "optional - string, display name used by the frontend to group properties under a header"
    - semantic_role: "optional - string, tag for future tools/views (e.g. gantt_start, gantt_end)"

capabilities:
  - id: "inventory"
  - id: "media"
  - id: "time_tracking"

# Node Classes for schema-driven Base Type selector
node_classes:
  - id: "standard"
    name: "Standard Node"
  - id: "asset"
    name: "Asset Node"
  - id: "media"
    name: "Media Node"